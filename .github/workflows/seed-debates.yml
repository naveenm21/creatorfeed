name: Seed Creator Debates

on:
  schedule:
    # 7:00am IST = 1:30am UTC — 1 problem
    - cron: '30 1 * * *'
    # 12:00pm IST = 6:30am UTC — 3 problems  
    - cron: '30 6 * * *'
    # 6:00pm IST = 12:30pm UTC — 3 problems
    - cron: '30 12 * * *'
    # 9:00pm IST = 3:30pm UTC — 3 problems
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of problems to post'
        required: false
        default: '1'

jobs:
  seed:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Determine batch size
        id: batch
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          if [ "$HOUR" = "01" ]; then
            echo "size=1" >> $GITHUB_OUTPUT
          else
            echo "size=3" >> $GITHUB_OUTPUT
          fi
          
      - name: Run seeding script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE: ${{ steps.batch.outputs.size }}
        run: node scripts/seed-debate.js
        
      - name: Commit updated problems.json
        run: |
          git config --local user.email \
            "github-actions@github.com"
          git config --local user.name \
            "GitHub Actions"
          git add problems.json
          git diff --staged --quiet || \
            git commit -m \
            "Mark problems as posted [skip ci]"
          git push
